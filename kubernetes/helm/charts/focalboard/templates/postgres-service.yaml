apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: "{{ .Release.Namespace }}"
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: "{{ .Release.Namespace }}"
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
