apiVersion: v1
kind: Service
metadata:
  name: focalboard-service
  namespace: "{{ .Release.Namespace }}"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9092"
spec:
  selector:
    app: focalboard
  ports:
    - name: http
      port: {{ .Values.server.port }}
      targetPort: {{ .Values.server.port_target }}

    - name: metrics
      port: {{ .Values.prometheusPort }}
      targetPort: {{ .Values.prometheusPort}}
  type: ClusterIP
