server:
  retention: "3d"

  persistentVolume:
    enable: true

prometheusSpec:
  storageSpec:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        ressources:
          requests:
            storage: 2Gi
          limits:
            storage: 10Gi

alertmanager:
  persistentVolume:
    size: 1Gi
    enable: true
