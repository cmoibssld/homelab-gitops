apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: prometheus
  namespace: argocd

spec:
  project: default

  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus
      targetRevision: 27.5.1
      helm:
        valueFiles:
          - $values/workloads/monitoring/prometheus-values.yaml
    - repoURL: https://github.com/cmoibssld/cloud-work.git
      targetRevision: gitops
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
