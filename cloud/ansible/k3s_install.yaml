- hosts: k3s
  become: yes

  tasks:
    - name: Install curl
      apt:
        name: curl
        state: present
        update_cache: yes

    - name: Install K3s
      shell: |
        curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for K3s
      command: kubectl get nodes
      register: result
      retries: 20
      delay: 10
      until: result.rc == 0
